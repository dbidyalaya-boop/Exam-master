<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 40px; text-align: center; }
        .box { max-width: 400px; background: white; padding: 30px; border-radius: 10px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2>👨‍🎓 Add New Student</h2>
    <input type="text" id="studentName" placeholder="Enter Student Name (e.g. Suman)">
    <button type="button" onclick="saveStudent()">Save to Database</button>
</div>

<script>
    async function saveStudent() {
        const name = document.getElementById('studentName').value;
        
        if(!name) {
            alert("❌ ଦୟାକରି ପିଲାଙ୍କ ନାମ ଲେଖନ୍ତୁ!");
            return;
        }

        try {
            const res = await fetch('/api/add-student', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            
            const data = await res.text();
            alert("✅ " + data);
            
            // ସେଭ୍ ହେବା ପରେ ଆପେ ଆପେ ମାର୍କ ଏଣ୍ଟ୍ରି ପେଜ୍ କୁ ଚାଲିଯିବ
            window.location.href = "add_marks.html"; 
        } catch (err) {
            alert("Error: " + err.message);
        }
    }
</script>
</body>
</html>
