<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management - Principal Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        .excellent { color: green; font-weight: bold; }
        .good { color: blue; font-weight: bold; }
        .average { color: orange; font-weight: bold; }
        .poor { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Teacher Performance Dashboard</h2>
    <table>
        <thead>
            <tr>
                <th>Teacher Name</th>
                <th>Subject</th>
                <th>Average Class %</th>
                <th>Grade</th>
                <th>Feedback</th>
            </tr>
        </thead>
        <tbody id="reportTableBody">
            </tbody>
    </table>
</div>

<script>
    // ଆମର API ରୁ ଡାଟା ଆଣିବା (Fetch Data)
    fetch('/api/reports')
        .then(response => response.json())
        .then(data => {
            const tableBody = document.getElementById('reportTableBody');
            data.forEach(row => {
                let avg = parseFloat(row.average_percentage).toFixed(2);
                let grade = "", feedback = "", gradeClass = "";

                if (avg >= 80) { grade = "Excellent"; feedback = "Very good teaching method."; gradeClass = "excellent"; }
                else if (avg >= 60) { grade = "Good"; feedback = "Good, but can improve."; gradeClass = "good"; }
                else if (avg >= 40) { grade = "Average"; feedback = "Needs to focus more on students."; gradeClass = "average"; }
                else { grade = "Needs Improvement"; feedback = "Principal attention required."; gradeClass = "poor"; }

                // ଟେବୁଲ୍ ରେ ଡାଟା ଭରିବା
                let tr = `<tr>
                    <td>👨‍🏫 ${row.teacher_name}</td>
                    <td>📖 ${row.subject}</td>
                    <td><strong>${avg}%</strong></td>
                    <td class="${gradeClass}">${grade}</td>
                    <td>💬 ${feedback}</td>
                </tr>`;
                tableBody.innerHTML += tr;
            });
        })
        .catch(error => console.error('Error fetching data:', error));
</script>

</body>
</html>
