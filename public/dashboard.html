<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <title>Dynamic School Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 250px; background: var(--primary); color: white; min-height: 100vh; padding: 20px; }
        .main-content { flex: 1; padding: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { margin: 10px 0; color: #7f8c8d; font-size: 14px; }
        .card p { font-size: 24px; font-weight: bold; color: var(--primary); margin: 0; }
        .chart-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .btn { padding: 15px; border-radius: 8px; text-decoration: none; color: white; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🏫 Exam Master</h2>
    <hr>
    <p><i class="fas fa-home"></i> Dashboard</p>
    <p><i class="fas fa-user-graduate"></i> Students</p>
</div>

<div class="main-content">
    <div class="stats-grid">
        <div class="card"><h3>Total Students</h3><p id="count-students">0</p></div>
        <div class="card"><h3>Active Subjects</h3><p>5</p></div>
        <div class="card"><h3>Avg Performance</h3><p id="avg-mark">0%</p></div>
    </div>

    <div class="chart-container">
        <h3><i class="fas fa-chart-line"></i> Student Performance Analysis</h3>
        <canvas id="performanceChart"></canvas>
    </div>

    <div class="btn-grid">
        <a href="add_student.html" class="btn" style="background: #27ae60;">Add Student</a>
        <a href="add_marks.html" class="btn" style="background: #e67e22;">Enter Marks</a>
        <a href="search_report.html" class="btn" style="background: #3498db;">View Reports</a>
    </div>
</div>

<script>
    async function loadDashboardData() {
        const res = await fetch('/api/dashboard-stats');
        const data = await res.json();

        // Stats Update
        document.getElementById('count-students').innerText = data.length;
        let total = 0;
        data.forEach(d => total += d.marks_obtained);
        document.getElementById('avg-mark').innerText = data.length > 0 ? (total / data.length).toFixed(1) + "%" : "0%";

        // Graph Update
        const labels = data.map(d => d.name);
        const marks = data.map(d => d.marks_obtained);

        new Chart(document.getElementById('performanceChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Student Marks',
                    data: marks,
                    backgroundColor: 'rgba(52, 152, 219, 0.7)',
                    borderColor: '#3498db',
                    borderWidth: 1
                }]
            },
            options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }
    loadDashboardData();
</script>
</body>
</html>
