<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <title>Enter Exam Marks</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 40px; }
        .box { max-width: 400px; background: white; padding: 30px; border-radius: 10px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>📝 Enter Marks</h2>
    <label>Student:</label>
    <select id="studentSelect"></select>
    <label>Subject:</label>
    <select id="subjectSelect"></select>
    <label>Marks Obtained (out of 100):</label>
    <input type="number" id="marks" max="100">
    <button onclick="saveMarks()">Save Marks ✅</button>
</div>

<script>
    async function init() {
        const [stuRes, subRes] = await Promise.all([fetch('/api/students'), fetch('/api/subjects')]);
        const students = await stuRes.json();
        const subjects = await subRes.json();

        document.getElementById('studentSelect').innerHTML = students.map(s => `<option value="${s.student_id}">${s.name}</option>`).join('');
        document.getElementById('subjectSelect').innerHTML = subjects.map(s => `<option value="${s.subject_id}">${s.subject_name}</option>`).join('');
    }

    async function saveMarks() {
        const data = {
            student_id: document.getElementById('studentSelect').value,
            subject_id: document.getElementById('subjectSelect').value,
            marks: document.getElementById('marks').value
        };

        const res = await fetch('/api/add-marks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        alert(await res.text());
    }
    init();
</script>
</body>
</html>
